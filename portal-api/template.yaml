AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Johnson Legal Team — Client Portal Data API (isolated, serverless, zero-cost tier).
  Lambda + API Gateway (HTTP API) + DynamoDB (on-demand). Confidential client
  data lives here, NOT in the public content bucket/CMS.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Architectures: [arm64]        # Graviton: cheaper per-ms
    Environment:
      Variables:
        TABLE_NAME: !Ref PortalTable
        COGNITO_USER_POOL_ID: !Ref PortalUserPool
        COGNITO_CLIENT_ID: !Ref PortalUserPoolClient
        COGNITO_REGION: !Ref AWS::Region

Parameters:
  CorsOrigin:
    Type: String
    Default: https://d1rqv10nry9s54.cloudfront.net
    Description: Allowed browser origin for the portal frontend.

Resources:

  # --- DynamoDB: single-table design, on-demand (scales to $0 when idle) -----
  PortalTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST      # on-demand: no idle cost
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        # Admin cross-user queries: GSI1PK groups by entity type
        # (e.g. "CASE", "USER", "REG#pending"), GSI1SK sorts within the group.
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      SSESpecification:
        SSEEnabled: true                # encryption at rest (confidential data)
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- Cognito: dedicated user pool for Johnson Legal Team portal ----------
  # Isolated from the metrotec/jude pools. Email/password login, admin-created
  # accounts with email verification, optional MFA.
  PortalUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: johnson-legal-portal
      # Admin-created accounts (invite-only); email is the sign-in identifier.
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: "OPTIONAL"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - { Name: verified_email, Priority: 1 }
      Schema:
        - { Name: email, AttributeDataType: String, Required: true, Mutable: true }
        - { Name: given_name, AttributeDataType: String, Required: false, Mutable: true }
        - { Name: family_name, AttributeDataType: String, Required: false, Mutable: true }

  PortalUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: johnson-legal-portal-web
      UserPoolId: !Ref PortalUserPool
      # Public SPA client: no secret (browser cannot keep one).
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH          # secure password auth used by amazon-cognito-identity-js
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # Role groups (map to the API's role logic: super_admin > admin > client).
  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: Firm staff with administrative access
      Precedence: 10
      UserPoolId: !Ref PortalUserPool

  SuperAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: super_admin
      Description: Full administrative access incl. role management
      Precedence: 1
      UserPoolId: !Ref PortalUserPool

  # --- HTTP API with a Cognito JWT authorizer -------------------------------
  PortalHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: [!Ref CorsOrigin]
        AllowHeaders: [Authorization, Content-Type]
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${PortalUserPool}"
              audience:
                - !Ref PortalUserPoolClient

  # --- Single Lambda routing all portal actions -----------------------------
  PortalFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
      Events:
        Profile:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /profile, Method: ANY }
        Cases:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /cases, Method: ANY }
        Documents:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /documents, Method: ANY }
        Messages:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /messages, Method: ANY }
        Invoices:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /invoices, Method: ANY }
        Appointments:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /appointments, Method: ANY }
        AdminClients:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /admin/clients, Method: ANY }
        AdminInvoices:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /admin/invoices, Method: ANY }
        AdminRegistrations:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /admin/registrations, Method: ANY }
        AdminUsers:
          Type: HttpApi
          Properties: { ApiId: !Ref PortalHttpApi, Path: /admin/users, Method: ANY }

Outputs:
  ApiUrl:
    Description: Base URL of the portal API (set as PORTAL_API_BASE in portal-api-client.js)
    Value: !Sub "https://${PortalHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref PortalTable
  UserPoolId:
    Description: Cognito User Pool ID (set in cognito-auth.js UserPoolId)
    Value: !Ref PortalUserPool
  UserPoolClientId:
    Description: Cognito App Client ID (set in cognito-auth.js ClientId)
    Value: !Ref PortalUserPoolClient
  Region:
    Value: !Ref AWS::Region
