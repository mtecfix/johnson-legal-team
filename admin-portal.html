<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Johnson Legal Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --admin-primary: #1e40af;
            --admin-secondary: #ea580c;
            --admin-bg: #f1f5f9;
        }
        body { background: var(--admin-bg); }
        .navbar { background: linear-gradient(135deg, var(--admin-primary), #1e3a8a); }
        .card { border: none; box-shadow: 0 4px 15px rgba(30, 64, 175, 0.1); }
        .card-header { background: var(--admin-primary); color: white; }
        .btn-primary { background: var(--admin-primary); border-color: var(--admin-primary); }
        .btn-warning { background: var(--admin-secondary); border-color: var(--admin-secondary); }
        .text-primary { color: var(--admin-primary) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-user-shield"></i> Admin Portal
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" id="adminEmail">Admin User</span>
                <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-users fa-2x text-primary mb-2"></i>
                        <h4 id="clientCount">0</h4>
                        <small>Active Clients</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-clock fa-2x text-warning mb-2"></i>
                        <h4 id="pendingCount">0</h4>
                        <small>Pending Approvals</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-balance-scale fa-2x text-success mb-2"></i>
                        <h4 id="caseCount">0</h4>
                        <small>Open Cases</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-tasks"></i> Client Management</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" onclick="manageClients()">
                                <i class="fas fa-users"></i> Manage Clients
                            </button>
                            <button class="btn btn-success" onclick="approvePending()">
                                <i class="fas fa-check-circle"></i> Approve Registrations
                            </button>
                            <button class="btn btn-warning" onclick="manageCases()">
                                <i class="fas fa-briefcase"></i> Manage Cases
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-file-alt"></i> Documents & Billing</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" onclick="manageDocuments()">
                                <i class="fas fa-folder"></i> Manage Documents
                            </button>
                            <button class="btn btn-success" onclick="createInvoice()">
                                <i class="fas fa-dollar-sign"></i> Create Invoice
                            </button>
                            <button class="btn btn-warning" onclick="viewReports()">
                                <i class="fas fa-chart-bar"></i> View Reports
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function manageClients() { window.location.href = 'admin/manage-clients.php'; }
        function approvePending() { alert('Approve Pending Registrations'); }
        function manageCases() { window.location.href = 'admin/manage-cases.php'; }
        function manageDocuments() { window.location.href = 'admin/manage-documents.php'; }
        function createInvoice() { window.location.href = 'admin/manage-billing.php'; }
        function viewReports() { alert('View Reports'); }
        function logout() { window.location.href = 'client-login.html'; }

        document.addEventListener('DOMContentLoaded', () => {
            const email = localStorage.getItem('admin_email') || 'Admin User';
            document.getElementById('adminEmail').textContent = email;
            document.getElementById('clientCount').textContent = '15';
            document.getElementById('pendingCount').textContent = '3';
            document.getElementById('caseCount').textContent = '8';
        });
    </script>
</body>
</html>
