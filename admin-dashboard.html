<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin Dashboard | Johnson Legal Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="combined-style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="index.html"><h1 class="site-title">Johnson Legal Team</h1></a>
        <div class="navbar-nav ms-auto align-items-center">
          <span class="nav-link" id="userGreeting"></span>
          <a class="nav-link" href="client-dashboard.html">My Dashboard</a>
          <a class="nav-link" href="#" id="logoutBtn">Logout</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container py-4">
    <div class="d-flex align-items-center gap-2 mb-4">
      <h1 class="mb-0">Admin Dashboard</h1>
      <span class="badge bg-dark" id="roleBadge">admin</span>
    </div>

    <!-- Shown if a non-admin somehow loads this page (server also enforces) -->
    <div id="accessDenied" class="alert alert-warning" style="display:none;">
      You do not have permission to view this page.
    </div>

    <div id="adminContent" style="display:none;">
      <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>

      <div id="panels" style="display:none;">
        <ul class="nav nav-tabs mb-3" role="tablist">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabClients">Clients</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabRegistrations">Registrations <span class="badge bg-danger d-none" id="regBadge"></span></button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabInvoices">Invoices</button></li>
          <li class="nav-item super-admin-only" style="display:none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabUsers">User Roles</button></li>
        </ul>

        <div class="tab-content">
          <div class="tab-pane fade show active" id="tabClients">
            <div class="card shadow-sm"><div class="card-body" id="clientsList">—</div></div>
          </div>
          <div class="tab-pane fade" id="tabRegistrations">
            <div class="card shadow-sm"><div class="card-body" id="registrationsList">—</div></div>
          </div>
          <div class="tab-pane fade" id="tabInvoices">
            <div class="card shadow-sm"><div class="card-body" id="invoicesList">—</div></div>
          </div>
          <div class="tab-pane fade" id="tabUsers">
            <div class="alert alert-info py-2">Role changes require super-admin and are logged.</div>
            <div class="card shadow-sm"><div class="card-body" id="usersList">—</div></div>
          </div>
        </div>
      </div>
    </div>

    <div id="errorBanner" class="alert alert-danger mt-3" style="display:none;"></div>
  </main>

  <footer style="background: var(--accent-primary); color: white; padding: 30px 0; margin-top: 50px;">
    <div class="container text-center"><p class="mb-0">&copy; 2026 Johnson Legal Team. All rights reserved.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="portal-config.js"></script>
  <script src="portal-api-client.js"></script>
  <script src="admin-dashboard.js"></script>
</body>
</html>
