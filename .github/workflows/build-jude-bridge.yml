name: Build & Push Jude Bridge Docker Image

# Triggers:
# - Manual dispatch (click "Run workflow" in GitHub Actions tab)
# - Push to master when bridge/ files change
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'jude-infra/bridge/**'

env:
  AWS_REGION: us-east-1
  ECR_REPO: 663877906756.dkr.ecr.us-east-1.amazonaws.com/jude-bridge

jobs:
  # Existing x86_64 build (kept as-is)
  build-x86:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (x86_64)
        working-directory: jude-infra/bridge
        run: |
          docker build -t ${{ env.ECR_REPO }}:v1-x86 .
          docker tag ${{ env.ECR_REPO }}:v1-x86 ${{ env.ECR_REPO }}:v1

      - name: Push to ECR (x86_64)
        run: |
          docker push ${{ env.ECR_REPO }}:v1-x86
          docker push ${{ env.ECR_REPO }}:v1

      - name: Output image URI
        run: |
          echo "✅ x86_64 pushed: ${{ env.ECR_REPO }}:v1-x86"
          echo "✅ x86_64 pushed: ${{ env.ECR_REPO }}:v1"

  # ARM64 build for AgentCore (Graviton)
  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image (ARM64)
        working-directory: jude-infra/bridge
        run: |
          docker build -t ${{ env.ECR_REPO }}:v1-arm64 .
          docker tag ${{ env.ECR_REPO }}:v1-arm64 ${{ env.ECR_REPO }}:latest-arm64

      - name: Push to ECR (ARM64)
        run: |
          docker push ${{ env.ECR_REPO }}:v1-arm64
          docker push ${{ env.ECR_REPO }}:latest-arm64

      - name: Output image URI
        run: |
          echo "✅ ARM64 pushed: ${{ env.ECR_REPO }}:v1-arm64"
          echo "✅ ARM64 pushed: ${{ env.ECR_REPO }}:latest-arm64"
