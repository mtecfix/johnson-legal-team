<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Client Dashboard | Johnson Legal Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="combined-style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="index.html"><h1 class="site-title">Johnson Legal Team</h1></a>
        <div class="navbar-nav ms-auto align-items-center">
          <span class="nav-link" id="userGreeting"></span>
          <a class="nav-link" href="#" id="logoutBtn">Logout</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container py-4">
    <h1 class="mb-4">Your Dashboard</h1>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Loading your information…</p>
    </div>

    <div id="dashboardContent" style="display:none;">
      <!-- Summary cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="card text-center shadow-sm"><div class="card-body">
          <div class="fs-3 fw-bold text-primary" id="activeCasesCount">0</div><div class="small text-muted">Active Cases</div>
        </div></div></div>
        <div class="col-6 col-md-3"><div class="card text-center shadow-sm"><div class="card-body">
          <div class="fs-3 fw-bold text-primary" id="documentsCount">0</div><div class="small text-muted">Documents</div>
        </div></div></div>
        <div class="col-6 col-md-3"><div class="card text-center shadow-sm"><div class="card-body">
          <div class="fs-3 fw-bold text-primary" id="messagesCount">0</div><div class="small text-muted">Unread Messages</div>
        </div></div></div>
        <div class="col-6 col-md-3"><div class="card text-center shadow-sm"><div class="card-body">
          <div class="fs-3 fw-bold text-primary" id="outstandingBalance">$0.00</div><div class="small text-muted">Outstanding</div>
        </div></div></div>
      </div>

      <div class="row g-4">
        <!-- Profile -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100"><div class="card-body">
            <h2 class="h5 border-bottom pb-2">Profile</h2>
            <div id="profileInfo"><p class="text-muted mb-0">—</p></div>
          </div></div>
        </div>
        <!-- Cases -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100"><div class="card-body">
            <h2 class="h5 border-bottom pb-2">Cases</h2>
            <div id="casesList"><p class="text-muted mb-0">—</p></div>
          </div></div>
        </div>
        <!-- Documents -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100"><div class="card-body">
            <h2 class="h5 border-bottom pb-2">Documents</h2>
            <div id="documentsList"><p class="text-muted mb-0">—</p></div>
          </div></div>
        </div>
        <!-- Appointments -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100"><div class="card-body">
            <h2 class="h5 border-bottom pb-2">Upcoming Appointments</h2>
            <div id="appointmentsList"><p class="text-muted mb-0">—</p></div>
          </div></div>
        </div>
        <!-- Messages -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100"><div class="card-body">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
              <h2 class="h5 mb-0">Messages</h2>
              <button class="btn btn-sm btn-primary" id="newMessageBtn" data-bs-toggle="modal" data-bs-target="#newMessageModal">New</button>
            </div>
            <div id="messagesList" class="mt-2"><p class="text-muted mb-0">—</p></div>
          </div></div>
        </div>
        <!-- Invoices -->
        <div class="col-lg-6">
          <div class="card shadow-sm h-100"><div class="card-body">
            <h2 class="h5 border-bottom pb-2">Invoices</h2>
            <div id="invoicesList"><p class="text-muted mb-0">—</p></div>
          </div></div>
        </div>
      </div>
    </div>

    <div id="errorBanner" class="alert alert-danger mt-4" style="display:none;"></div>
  </main>

  <!-- New message modal -->
  <div class="modal fade" id="newMessageModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">New Message</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Subject</label>
          <input class="form-control" id="msgSubject" maxlength="200"></div>
        <div class="mb-3"><label class="form-label">Message</label>
          <textarea class="form-control" id="msgBody" rows="4" maxlength="5000"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="sendMessageBtn">Send</button>
      </div>
    </div></div>
  </div>

  <footer style="background: var(--accent-primary); color: white; padding: 30px 0; margin-top: 50px;">
    <div class="container text-center"><p class="mb-0">&copy; 2026 Johnson Legal Team. All rights reserved.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="portal-api-client.js"></script>
  <script src="client-dashboard.js"></script>
</body>
</html>
