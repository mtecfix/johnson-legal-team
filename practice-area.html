<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Area | Johnson Legal Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="combined-style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="index.html"><h1 class="site-title">Johnson Legal Team</h1></a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link active" href="practice-areas.html">Practice Areas</a>
          <a class="nav-link" href="team.html">Our Team</a>
          <a class="nav-link" href="blog.html">Blog</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container py-5">
    <!-- Directory view (no ?area= param): lists all practice areas -->
    <div id="areaList" class="row g-4" style="display:none;"></div>

    <!-- Detail view (?area=slug) -->
    <article id="areaView" style="display:none;">
      <a href="practice-area.html" class="btn btn-outline-secondary btn-sm mb-3"><i class="fas fa-arrow-left"></i> All practice areas</a>
      <img id="areaImage" class="img-fluid rounded mb-4 w-100" style="max-height:340px;object-fit:cover;" alt="" />
      <h1 class="mb-3"><i id="areaIcon"></i> <span id="areaTitle"></span></h1>
      <div id="areaBody"></div>
      <section id="areaFaqs" class="mt-5" style="display:none;">
        <h2 class="h4 mb-3">Frequently Asked Questions</h2>
        <div id="faqAccordion" class="accordion"></div>
      </section>
    </article>
  </main>

  <footer style="background: var(--accent-primary); color: white; padding: 40px 0; margin-top: 60px;">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Johnson Legal Team. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="content.js"></script>
  <script src="practice-area.js"></script>
</body>
</html>
