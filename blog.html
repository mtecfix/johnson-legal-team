<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Johnson Legal Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="combined-style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="index.html"><h1 class="site-title">Johnson Legal Team</h1></a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="practice-areas.html">Practice Areas</a>
          <a class="nav-link active" href="blog.html">Blog</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container py-5">
    <h1 class="mb-4">Legal Insights &amp; Firm News</h1>

    <!-- Single-post view (shown when ?post=slug is present) -->
    <article id="postView" style="display:none;">
      <a href="blog.html" class="btn btn-outline-secondary btn-sm mb-3"><i class="fas fa-arrow-left"></i> All posts</a>
      <img id="postImage" class="img-fluid rounded mb-4 w-100" style="max-height:360px;object-fit:cover;" alt="" />
      <span class="badge bg-primary" id="postCategory"></span>
      <h2 id="postTitle" class="mt-2"></h2>
      <p class="text-muted" id="postDate"></p>
      <div id="postBody" class="mt-4"></div>
    </article>

    <!-- List view -->
    <div id="postList" class="row g-4"></div>
  </main>

  <footer style="background: var(--accent-primary); color: white; padding: 40px 0; margin-top: 60px;">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Johnson Legal Team. All rights reserved.</p>
    </div>
  </footer>

  <!-- Lightweight markdown renderer (open-source, MIT) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="blog.js"></script>
</body>
</html>
