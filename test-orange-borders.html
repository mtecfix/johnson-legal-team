<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Orange Borders</title>
    <style>
        /* Test elements with orange borders */
        .test-card-1 {
            border: 1px solid #ea580c;
            padding: 20px;
            margin: 10px;
        }
        
        .test-card-2 {
            border: 2px solid #ea580c;
            padding: 20px;
            margin: 10px;
        }
        
        .test-card-3 {
            border-color: #ea580c;
            border-width: 1px;
            border-style: solid;
            padding: 20px;
            margin: 10px;
        }
        
        .border-orange {
            border: 1px solid #ea580c;
            padding: 20px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Test Orange Borders</h1>
    
    <div class="test-card-1">Card with border: 1px solid #ea580c</div>
    <div class="test-card-2">Card with border: 2px solid #ea580c</div>
    <div class="test-card-3">Card with border-color: #ea580c</div>
    <div class="border-orange">Card with .border-orange class</div>
    
    <script src="check-orange-borders.js"></script>
</body>
</html>
